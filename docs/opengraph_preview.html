<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PropertyVala - OpenGraph Preview</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .og-card {
    width: 1200px;
    height: 630px;
    background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
    border-radius: 16px;
    padding: 60px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    position: relative;
    overflow: hidden;
    border: 1px solid rgba(99, 102, 241, 0.3);
  }
  .og-card::before {
    content: '';
    position: absolute;
    top: -50%;
    right: -50%;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, transparent 70%);
  }
  .og-badge {
    display: inline-block;
    padding: 8px 20px;
    background: rgba(99, 102, 241, 0.2);
    border: 1px solid rgba(99, 102, 241, 0.5);
    border-radius: 50px;
    color: #6366f1;
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 24px;
    width: fit-content;
    position: relative;
    z-index: 1;
  }
  .og-title {
    font-size: 64px;
    font-weight: 800;
    line-height: 1.1;
    margin-bottom: 20px;
    position: relative;
    z-index: 1;
  }
  .og-title .gradient {
    background: linear-gradient(90deg, #6366f1, #8b5cf6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .og-subtitle {
    font-size: 24px;
    color: #9ca3af;
    line-height: 1.5;
    max-width: 900px;
    position: relative;
    z-index: 1;
  }
  .og-footer {
    position: absolute;
    bottom: 40px;
    left: 60px;
    right: 60px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: #6b7280;
    font-size: 16px;
    z-index: 1;
  }
  .og-logo {
    font-size: 20px;
    font-weight: 700;
    color: #fff;
  }
  .og-stats {
    display: flex;
    gap: 40px;
  }
  .og-stat {
    text-align: center;
  }
  .og-stat-value {
    font-size: 28px;
    font-weight: 700;
    color: #6366f1;
  }
  .og-stat-label {
    font-size: 12px;
    color: #9ca3af;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
</style>
</head>
<body>
  <div class="og-card">
    <div class="og-badge">Open Source Real Estate Tech</div>
    <h1 class="og-title">
      <span class="gradient">PropertyVala:</span><br>
      AI-Powered Lead Generation
    </h1>
    <p class="og-subtitle">
      Turn buyer intent into closed deals. 300+ verified leads, 0-100 AI scoring, 
      automated WhatsApp outreach, and enforced commission collection.
    </p>
    <div class="og-footer">
      <div class="og-logo">github.com/MrHTC/AGENTIC-LEAD-ENGINE</div>
      <div class="og-stats">
        <div class="og-stat">
          <div class="og-stat-value">7</div>
          <div class="og-stat-label">Agents</div>
        </div>
        <div class="og-stat">
          <div class="og-stat-value">300+</div>
          <div class="og-stat-label">Leads</div>
        </div>
        <div class="og-stat">
          <div class="og-stat-value">MIT</div>
          <div class="og-stat-label">License</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
